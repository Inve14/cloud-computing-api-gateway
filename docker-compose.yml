# Main Docker Compose orchestration file.
# Manages all services for local development and production on the EC2 VM.
#
# Usage:
#   cp .env.example .env   # fill in passwords first
#   docker compose up -d
#
# This file grows as new microservices are added. Each service that is not
# yet scaffolded should be added here when its services/ directory is ready.

services:

  # ---------------------------------------------------------------------------
  # catalog-db — PostgreSQL 16 for the Catalog service
  # One instance for now (master only). A read-replica will be added in a
  # later step to demonstrate PostgreSQL streaming replication.
  # ---------------------------------------------------------------------------
  catalog-db:
    image: postgres:16.3-alpine
    container_name: catalog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Persist database files across container restarts.
      - catalog-db-data:/var/lib/postgresql/data
      # Schema + seed data — executed only on first initialisation (empty volume).
      - ./infrastructure/postgres/catalog/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # pg_isready exits 0 when PostgreSQL is accepting connections.
      # $$ escapes the dollar sign so Compose does not interpolate it;
      # the shell inside the container reads POSTGRES_USER from its own env.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # catalog — Catalog microservice (Fastify / Node.js 20)
  # Starts only after catalog-db passes its healthcheck (condition: service_healthy).
  # ---------------------------------------------------------------------------
  catalog:
    build: ./services/catalog
    container_name: catalog
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # hostname is `catalog-db` (Docker internal DNS), not localhost.
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@catalog-db:5432/${POSTGRES_DB}"
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      catalog-db:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # users-db — PostgreSQL 16 for the Users service
  # ---------------------------------------------------------------------------
  users-db:
    image: postgres:16.3-alpine
    container_name: users-db
    environment:
      POSTGRES_USER: ${USERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USERS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USERS_POSTGRES_DB}
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/users/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # users — Users microservice (Fastify / Node.js 20)
  # Starts only after users-db passes its healthcheck (condition: service_healthy).
  # ---------------------------------------------------------------------------
  users:
    build: ./services/users
    container_name: users
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3002"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgresql://${USERS_POSTGRES_USER}:${USERS_POSTGRES_PASSWORD}@users-db:5432/${USERS_POSTGRES_DB}"
      JWT_PRIVATE_KEY_PATH: /etc/jwt-keys/private.pem
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
      JWT_ACCESS_TTL_SEC: "900"
      JWT_REFRESH_TTL_DAYS: "7"
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      users-db:
        condition: service_healthy
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # orders-db — PostgreSQL 16 for the Orders service
  # ---------------------------------------------------------------------------
  orders-db:
    image: postgres:16.3-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: ${ORDERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ORDERS_POSTGRES_DB}
    volumes:
      - orders-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/orders/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # orders — Orders microservice (Fastify / Node.js 20)
  # Starts only after orders-db passes its healthcheck (condition: service_healthy).
  # ---------------------------------------------------------------------------
  orders:
    build: ./services/orders
    container_name: orders
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3003"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgresql://${ORDERS_POSTGRES_USER}:${ORDERS_POSTGRES_PASSWORD}@orders-db:5432/${ORDERS_POSTGRES_DB}"
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      orders-db:
        condition: service_healthy
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # payments-db — PostgreSQL 16 for the Payments service
  # ---------------------------------------------------------------------------
  payments-db:
    image: postgres:16.3-alpine
    container_name: payments-db
    environment:
      POSTGRES_USER: ${PAYMENTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PAYMENTS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PAYMENTS_POSTGRES_DB}
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/payments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # payments — Payments microservice (Fastify / Node.js 20)
  # Starts only after payments-db passes its healthcheck (condition: service_healthy).
  # ---------------------------------------------------------------------------
  payments:
    build: ./services/payments
    container_name: payments
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3004"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgresql://${PAYMENTS_POSTGRES_USER}:${PAYMENTS_POSTGRES_PASSWORD}@payments-db:5432/${PAYMENTS_POSTGRES_DB}"
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      payments-db:
        condition: service_healthy
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # kong — API Gateway (DB-less mode, declarative configuration)
  # Single entry point for all external traffic. Routes requests to the
  # appropriate microservice and enforces rate limiting and CORS globally.
  #
  # Port 8001 (Admin API) is exposed here for local development only.
  # It MUST NOT be opened in the AWS Security Group in production.
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: notice
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./infrastructure/kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - catalog
      - users
      - orders
      - payments
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

# -----------------------------------------------------------------------------
# Named volumes — data persists across `docker compose down` (but not `down -v`)
# -----------------------------------------------------------------------------
volumes:
  catalog-db-data:
  users-db-data:
  orders-db-data:
  payments-db-data:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
