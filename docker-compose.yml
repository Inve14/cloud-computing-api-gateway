# Main Docker Compose orchestration file.
# Manages all services for local development and production on the EC2 VM.
#
# Usage:
#   cp .env.example .env   # fill in passwords first
#   docker compose up -d
#
# This file grows as new microservices are added. Each service that is not
# yet scaffolded should be added here when its services/ directory is ready.

services:

  # ---------------------------------------------------------------------------
  # catalog-db-master — PostgreSQL 16 master for the Catalog service.
  # Streaming replication is enabled; catalog-db-replica subscribes to it.
  # ---------------------------------------------------------------------------
  catalog-db-master:
    image: postgres:16.3-alpine
    container_name: catalog-db-master
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - catalog-db-master-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/catalog/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infrastructure/postgres/catalog/init-master.sh:/docker-entrypoint-initdb.d/02-init-master.sh:ro
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=4
      -c hot_standby=on
      -c hot_standby_feedback=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # catalog-db-replica — PostgreSQL 16 streaming read-replica for the Catalog.
  # Bootstrapped via pg_basebackup from the master on first start (-R writes
  # standby.signal and primary_conninfo automatically).
  # ---------------------------------------------------------------------------
  catalog-db-replica:
    image: postgres:16.3-alpine
    container_name: catalog-db-replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - catalog-db-replica-data:/var/lib/postgresql/data
    command: |
      bash -c '
      if [ ! -s "$$PGDATA/PG_VERSION" ]; then
        until pg_isready -h catalog-db-master -p 5432; do sleep 2; done
        PGPASSWORD=$$POSTGRES_REPLICATION_PASSWORD pg_basebackup -h catalog-db-master -p 5432 -U $$POSTGRES_REPLICATION_USER -D $$PGDATA -P -X stream -R
        chmod 0700 $$PGDATA
      fi
      exec docker-entrypoint.sh postgres -c hot_standby=on
      '
    depends_on:
      catalog-db-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # catalog — Catalog microservice (Fastify / Node.js 20)
  # Starts only after catalog-db passes its healthcheck (condition: service_healthy).
  #
  # 3 replicas: container_name and host port mapping are intentionally absent —
  # both are incompatible with scaling. Access via Kong on :8000 only.
  # Docker DNS resolves "catalog" to all replicas; Kong round-robins across them.
  # ---------------------------------------------------------------------------
  catalog:
    build: ./services/catalog
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@catalog-db-master:5432/${POSTGRES_DB}"
      DATABASE_REPLICA_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@catalog-db-replica:5432/${POSTGRES_DB}"
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      catalog-db-master:
        condition: service_healthy
      catalog-db-replica:
        condition: service_healthy
    expose:
      - "3001"
    deploy:
      replicas: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # users-db — PostgreSQL 16 for the Users service
  # ---------------------------------------------------------------------------
  users-db:
    image: postgres:16.3-alpine
    container_name: users-db
    environment:
      POSTGRES_USER: ${USERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USERS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USERS_POSTGRES_DB}
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/users/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # users — Users microservice (Fastify / Node.js 20)
  # Starts only after users-db passes its healthcheck (condition: service_healthy).
  #
  # 2 replicas: container_name and host port mapping are intentionally absent.
  # Access via Kong on :8000 only.
  # ---------------------------------------------------------------------------
  users:
    build: ./services/users
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3002"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgresql://${USERS_POSTGRES_USER}:${USERS_POSTGRES_PASSWORD}@users-db:5432/${USERS_POSTGRES_DB}"
      JWT_PRIVATE_KEY_PATH: /etc/jwt-keys/private.pem
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
      JWT_ACCESS_TTL_SEC: "900"
      JWT_REFRESH_TTL_DAYS: "7"
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      users-db:
        condition: service_healthy
    expose:
      - "3002"
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # orders-db — PostgreSQL 16 for the Orders service
  # ---------------------------------------------------------------------------
  orders-db:
    image: postgres:16.3-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: ${ORDERS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ORDERS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ORDERS_POSTGRES_DB}
    volumes:
      - orders-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/orders/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # orders — Orders microservice (Fastify / Node.js 20)
  # Starts only after orders-db passes its healthcheck (condition: service_healthy).
  #
  # 2 replicas: container_name and host port mapping are intentionally absent.
  # Access via Kong on :8000 only.
  # ---------------------------------------------------------------------------
  orders:
    build: ./services/orders
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3003"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgresql://${ORDERS_POSTGRES_USER}:${ORDERS_POSTGRES_PASSWORD}@orders-db:5432/${ORDERS_POSTGRES_DB}"
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      orders-db:
        condition: service_healthy
    expose:
      - "3003"
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # payments-db — PostgreSQL 16 for the Payments service
  # ---------------------------------------------------------------------------
  payments-db:
    image: postgres:16.3-alpine
    container_name: payments-db
    environment:
      POSTGRES_USER: ${PAYMENTS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PAYMENTS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${PAYMENTS_POSTGRES_DB}
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/payments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # payments — Payments microservice (Fastify / Node.js 20)
  # Starts only after payments-db passes its healthcheck (condition: service_healthy).
  #
  # 2 replicas: container_name and host port mapping are intentionally absent.
  # Access via Kong on :8000 only.
  # ---------------------------------------------------------------------------
  payments:
    build: ./services/payments
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3004"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: "postgresql://${PAYMENTS_POSTGRES_USER}:${PAYMENTS_POSTGRES_PASSWORD}@payments-db:5432/${PAYMENTS_POSTGRES_DB}"
      JWT_PUBLIC_KEY_PATH: /etc/jwt-keys/public.pem
    volumes:
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    depends_on:
      payments-db:
        condition: service_healthy
    expose:
      - "3004"
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # kong — API Gateway (DB-less mode, declarative configuration)
  # Single entry point for all external traffic. Routes requests to the
  # appropriate microservice and enforces rate limiting and CORS globally.
  #
  # Port 8001 (Admin API) is exposed here for local development only.
  # It MUST NOT be opened in the AWS Security Group in production.
  # ---------------------------------------------------------------------------
  kong:
    image: kong:3.9.1
    container_name: kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: notice
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./infrastructure/kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
      - ./infrastructure/jwt-keys:/etc/jwt-keys:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - catalog
      - users
      - orders
      - payments
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # prometheus — Metrics collection
  # Scrapes Kong (:8001/metrics) and all 4 microservices (:PORT/metrics).
  # Data retained for 7 days. Admin UI at http://localhost:9090.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    networks:
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # grafana — Dashboards and visualisation
  # Auto-provisions Prometheus datasource and the microservices dashboard.
  # UI at http://localhost:3000 (admin/admin, anonymous viewer enabled).
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infrastructure/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./infrastructure/monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/default.yml:ro
      - ./infrastructure/monitoring/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - backend
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Named volumes — data persists across `docker compose down` (but not `down -v`)
# -----------------------------------------------------------------------------
volumes:
  catalog-db-master-data:
  catalog-db-replica-data:
  users-db-data:
  orders-db-data:
  payments-db-data:
  prometheus-data:
  grafana-data:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  backend:
    driver: bridge
