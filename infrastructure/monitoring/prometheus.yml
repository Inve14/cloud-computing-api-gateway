global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: kong
    static_configs:
      - targets: ["kong:8001"]
    metrics_path: /metrics

  - job_name: catalog
    static_configs:
      - targets: ["catalog:3001"]
    metrics_path: /metrics

  - job_name: users
    static_configs:
      - targets: ["users:3002"]
    metrics_path: /metrics

  - job_name: orders
    static_configs:
      - targets: ["orders:3003"]
    metrics_path: /metrics

  - job_name: payments
    static_configs:
      - targets: ["payments:3004"]
    metrics_path: /metrics
