_format_version: "3.0"

# =============================================================================
# Kong API Gateway — DB-less declarative configuration
# =============================================================================
# Kong runs in DB-less mode (KONG_DATABASE=off). This file is the single
# source of truth for all routing, plugin, and policy configuration.
#
# Reload at runtime (no restart needed):
#   curl -X POST http://localhost:8001/config -F config=@infrastructure/kong/kong.yml
#
# Validate locally without a running Kong:
#   docker run --rm -v $(pwd)/infrastructure/kong:/kong/declarative \
#     kong:3.7-alpine kong config parse /kong/declarative/kong.yml
# =============================================================================

# -----------------------------------------------------------------------------
# Global plugins — applied to every proxied request across all services.
# -----------------------------------------------------------------------------
plugins:
  # Generates X-Correlation-ID if the client did not supply one, then
  # propagates it upstream (with echo_downstream: true). Every microservice includes this header in
  # structured log entries and RFC 7807 error responses.
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true

  # Prometheus — exposes Kong metrics at :8001/metrics for Prometheus scraping.
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      upstream_health_metrics: true
      bandwidth_metrics: false

  # CORS — permissive for local dev; tighten origins in production.
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Authorization
        - Content-Type
        - Accept
        - X-Correlation-ID
      exposed_headers:
        - X-Correlation-ID
      credentials: false
      max_age: 3600
      preflight_continue: false

# =============================================================================
# JWT consumers
# =============================================================================
# A single consumer represents "any valid token issued by our users service".
# Kong resolves the jwt_secret via the `iss` claim in the token payload —
# it must equal the `key` field below. The users service sets iss: "users-service".
# =============================================================================
consumers:
  - username: default-jwt-consumer
    jwt_secrets:
      - key: "users-service"
        algorithm: RS256
        # Inline public key (mirrors infrastructure/jwt-keys/public.pem).
        # Kong uses this to verify RS256 signatures; the private key never
        # leaves the users service.
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAjFMr4Cs8qTkWponKFB+p
          g10gq3L70FnYV9MGV4gzr+N1i0YuRyQX5BcSQY/cEs/4Lxz4eUcG2EyDBSnofknH
          0Q50kDLLyXlhObsDb4GvUCbyzmbsaaVoVpXpm3hAcb6Jr7Wk+Ccpvhw0UpsV/rwf
          ez2j+7nPKZf762x63UVV4VyaVWpjzvbwJbLysunRHniMytJBq1zcEJeYHSBhFuTi
          NKgpDYZ7he5hR/arwilfpqhBOiOOvqOxGK3oCxW31pAn1O4tU1RggbXGoUyC/FGj
          oxl8SKrLEnV+EEOqQ8gBxVE1sE75c6Au5jRqqx5VcqzCSawy9ueu0PBhvjW/DfO2
          bwIDAQAB
          -----END PUBLIC KEY-----

# =============================================================================
# Upstreams
# =============================================================================
# Each upstream enables passive health checking and round-robin load balancing
# across all replicas that Docker DNS resolves to the service hostname.
# Passive health checks require no extra polling: Kong marks a target
# unhealthy after 3 consecutive failures and re-admits it after 2 successes.
# Active health checks are disabled (interval defaults to 0) to avoid
# unnecessary traffic; passive checks are sufficient for our replica count.
# =============================================================================
upstreams:

  - name: catalog-upstream
    algorithm: round-robin
    healthchecks:
      passive:
        unhealthy:
          http_failures: 3
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
        healthy:
          successes: 2
          http_statuses: [200, 201, 204]
    targets:
      - target: catalog:3001
        weight: 100

  - name: users-upstream
    algorithm: round-robin
    healthchecks:
      passive:
        unhealthy:
          http_failures: 3
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
        healthy:
          successes: 2
          http_statuses: [200, 201, 204]
    targets:
      - target: users:3002
        weight: 100

  - name: orders-upstream
    algorithm: round-robin
    healthchecks:
      passive:
        unhealthy:
          http_failures: 3
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
        healthy:
          successes: 2
          http_statuses: [200, 201, 204]
    targets:
      - target: orders:3003
        weight: 100

  - name: payments-upstream
    algorithm: round-robin
    healthchecks:
      passive:
        unhealthy:
          http_failures: 3
          http_statuses: [500, 502, 503, 504]
          tcp_failures: 3
          timeouts: 3
        healthy:
          successes: 2
          http_statuses: [200, 201, 204]
    targets:
      - target: payments:3004
        weight: 100

# =============================================================================
# Services
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # catalog-service
  # Serves product catalog, categories, and stock queries.
  # Read endpoints are public. Write operations (POST/PUT/PATCH/DELETE) on
  # /products and /categories require a valid JWT (admin only in practice,
  # enforced by the catalog service itself after Kong's signature check).
  # ---------------------------------------------------------------------------
  - name: catalog-service
    host: catalog-upstream
    port: 80
    protocol: http
    connect_timeout: 3000
    write_timeout: 3000
    read_timeout: 3000
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: ip
          hide_client_headers: false
    routes:
      # -- Protected: write operations on products (JWT required) --
      # This route is more specific than the public catch-all below, so Kong's
      # longest-prefix rule will select it for POST/PUT/PATCH/DELETE on this path.
      - name: catalog-products-write
        paths:
          - /api/v1/catalog/products
        methods:
          - POST
          - PUT
          - PATCH
          - DELETE
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              # Allow OPTIONS (CORS preflight) without a token.
              run_on_preflight: false

      # -- Protected: write operations on categories (JWT required) --
      - name: catalog-categories-write
        paths:
          - /api/v1/catalog/categories
        methods:
          - POST
          - PUT
          - PATCH
          - DELETE
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              run_on_preflight: false

      # -- Public catch-all: read endpoints (no JWT) --
      - name: catalog-routes
        paths:
          - /api/v1/catalog
        strip_path: false

  # ---------------------------------------------------------------------------
  # users-service
  # Handles registration, authentication, profiles, and addresses.
  #
  # Route ordering matters here. Kong uses longest-prefix matching, so more
  # specific paths must appear before the catch-all to take priority:
  #   /api/v1/users/auth/login    → public, tight rate limit
  #   /api/v1/users/auth/register → public, tight rate limit
  #   /api/v1/users/auth          → public catch-all (refresh, logout, …)
  #   /api/v1/users               → protected catch-all (JWT required)
  # ---------------------------------------------------------------------------
  - name: users-service
    host: users-upstream
    port: 80
    protocol: http
    connect_timeout: 3000
    write_timeout: 3000
    read_timeout: 3000
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: ip
          hide_client_headers: false
    routes:
      # -- Public auth routes (must be listed before the catch-all so that
      #    Kong's longest-prefix rule picks them up first) --

      - name: users-auth-login
        paths:
          - /api/v1/users/auth/login
        strip_path: false
        plugins:
          # Overrides the service-level 100/min: this route is also counted
          # against the service counter, but the 10/min limit here is hit
          # first, making it the effective cap for login attempts.
          - name: rate-limiting
            config:
              minute: 10
              policy: local
              limit_by: ip
              hide_client_headers: false

      - name: users-auth-register
        paths:
          - /api/v1/users/auth/register
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 10
              policy: local
              limit_by: ip
              hide_client_headers: false

      # -- Public auth catch-all: covers /auth/refresh, /auth/logout, etc. --
      # Refresh needs no access token (uses a refresh token in the body).
      # Logout is idempotent even with an expired access token, so we keep
      # the entire /auth/* namespace public at the gateway layer. The service
      # enforces its own auth logic internally.
      - name: users-auth-routes
        paths:
          - /api/v1/users/auth
        strip_path: false

      # -- Protected catch-all: /api/v1/users/* (JWT required) --
      # Covers /me, /addresses, admin profile endpoints, etc.
      - name: users-routes
        paths:
          - /api/v1/users
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              run_on_preflight: false

  # ---------------------------------------------------------------------------
  # orders-service
  # Owns both the cart flow (/api/v1/cart/*) and order history (/api/v1/orders/*).
  # Both path groups are served by the same Fastify process on port 3003.
  # All cart and order operations require authentication.
  # ---------------------------------------------------------------------------
  - name: orders-service
    host: orders-upstream
    port: 80
    protocol: http
    connect_timeout: 3000
    write_timeout: 3000
    read_timeout: 3000
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          limit_by: ip
          hide_client_headers: false
    routes:
      - name: cart-routes
        paths:
          - /api/v1/cart
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              run_on_preflight: false

      - name: orders-routes
        paths:
          - /api/v1/orders
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              run_on_preflight: false

  # ---------------------------------------------------------------------------
  # payments-service
  # Payment status, history, and admin refunds require authentication.
  # The internal processing endpoint (/internal/payments/process) is
  # intentionally NOT exposed here — callable only on the Docker network.
  # ---------------------------------------------------------------------------
  - name: payments-service
    host: payments-upstream
    port: 80
    protocol: http
    connect_timeout: 3000
    write_timeout: 3000
    read_timeout: 3000
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          limit_by: ip
          hide_client_headers: false
    routes:
      - name: payments-routes
        paths:
          - /api/v1/payments
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
              run_on_preflight: false
